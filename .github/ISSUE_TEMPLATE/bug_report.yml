name: Bug Report
description: File a bug report to help us improve wAether
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report for wAether!
        
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true
      
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: true
      
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
      
  - type: dropdown
    id: device-type
    attributes:
      label: Device type
      description: What type of device are you using?
      options:
        - Wear OS smartwatch
        - Android phone/tablet (if applicable)
        - Other
    validations:
      required: true
      
  - type: input
    id: device-model
    attributes:
      label: Device model
      description: What device model are you using?
      placeholder: e.g., Galaxy Watch 4, Pixel Watch, etc.
    validations:
      required: true
      
  - type: input
    id: wear-os-version
    attributes:
      label: Wear OS version
      description: What version of Wear OS are you running?
      placeholder: e.g., Wear OS 3.5, Wear OS 4.0
    validations:
      required: true
      
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here, including screenshots if applicable.
      placeholder: Any additional information that might help us understand the issue
    validations:
      required: false
      
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
