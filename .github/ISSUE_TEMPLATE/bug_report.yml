name: Bug Report
description: Report a bug or issue with wAether
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide the following information to help us reproduce and fix the issue.

  - type: checkboxes
    id: terms
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have checked the latest version of wAether
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Tell us what you expected!
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: device-type
    attributes:
      label: Device Type
      description: What type of device are you using?
      options:
        - Wear OS Smartwatch
        - Android Phone (for testing)
        - Emulator
        - Other
    validations:
      required: true

  - type: input
    id: device-model
    attributes:
      label: Device Model
      description: Specific device model (e.g., Galaxy Watch 4, Pixel Watch)
      placeholder: ex. Galaxy Watch 4
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: Wear OS or Android version
      placeholder: ex. Wear OS 3.5, Android 13
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: wAether app version (check in app settings)
      placeholder: ex. v1.2.3
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Messages
      description: Include any relevant logs, error messages, or crash reports
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, network conditions, etc.)