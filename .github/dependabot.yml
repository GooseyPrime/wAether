# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Enable version updates for Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "GooseyPrime"
    assignees:
      - "GooseyPrime"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
    # Group minor and patch updates together
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin:
        patterns:
          - "*kotlin*"
          - "org.jetbrains.*"
      firebase:
        patterns:
          - "com.google.firebase*"
          - "com.google.gms*"
      networking:
        patterns:
          - "com.squareup.retrofit2*"
          - "com.squareup.okhttp3*"
      testing:
        patterns:
          - "*test*"
          - "*junit*"
          - "*espresso*"
    # Allow automatic merging for minor updates
    auto-merge:
      # Only auto-merge patch updates
      dependency-type: "security-updates"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "GooseyPrime"
    assignees:
      - "GooseyPrime"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "ci/cd"