# GitHub Labels Configuration for wAether
# This file defines the standard labels for the project

# Type Labels
- name: "bug"
  color: "d73a49"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

- name: "maintenance"
  color: "fbca04"
  description: "Code maintenance, refactoring, or technical debt"

# Priority Labels
- name: "priority: critical"
  color: "b60205"
  description: "Blocking issues that prevent app usage"

- name: "priority: high"
  color: "e99695"
  description: "Important issues that significantly impact functionality"

- name: "priority: medium"
  color: "fbca04"
  description: "Moderate issues that should be addressed soon"

- name: "priority: low"
  color: "0e8a16"
  description: "Minor issues or nice-to-have improvements"

# Component Labels
- name: "component: weather"
  color: "1d76db"
  description: "Weather data display and processing"

- name: "component: space-weather"
  color: "5319e7"
  description: "Space weather monitoring and alerts"

- name: "component: mood-tracking"
  color: "f9d0c4"
  description: "Mood logging and correlation features"

- name: "component: watch-face"
  color: "c2e0c6"
  description: "Watch face rendering and design"

- name: "component: sensors"
  color: "bfd4f2"
  description: "Device sensors and data collection"

- name: "component: ui"
  color: "d4c5f9"
  description: "User interface and user experience"

- name: "component: performance"
  color: "ff6b6b"
  description: "Performance optimization"

- name: "component: accessibility"
  color: "4ecdc4"
  description: "Accessibility improvements"

# Platform Labels
- name: "platform: wear-os"
  color: "fef2c0"
  description: "Wear OS specific issues"

- name: "platform: android"
  color: "a4de6c"
  description: "Android platform issues"

- name: "platform: emulator"
  color: "ffc048"
  description: "Android emulator specific issues"

# Status Labels
- name: "status: needs-triage"
  color: "ededed"
  description: "New issues that need initial review"

- name: "status: confirmed"
  color: "0052cc"
  description: "Confirmed bugs or accepted feature requests"

- name: "status: in-progress"
  color: "fbca04"
  description: "Currently being worked on"

- name: "status: blocked"
  color: "d93f0b"
  description: "Cannot proceed due to external dependencies"

- name: "status: duplicate"
  color: "cfd3d7"
  description: "Duplicate of another issue"

- name: "status: wontfix"
  color: "ffffff"
  description: "Will not be implemented or fixed"

- name: "status: help-wanted"
  color: "128a0c"
  description: "Community contributions welcome"

- name: "status: good-first-issue"
  color: "7057ff"
  description: "Good for newcomers"

# Special Labels
- name: "needs-triage"
  color: "ededed"
  description: "Automatically applied to new issues"