name: CI - Build and Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security checks daily at 6 AM UTC
    - cron: '0 6 * * *'

env:
  # Fail fast on security vulnerabilities
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Run lint checks
      run: ./gradlew lintDebug --stacktrace

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/build/outputs/
        retention-days: 7

  dependency-check:
    name: Security - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache NVD database
      uses: actions/cache@v4
      with:
        path: ~/.gradle/dependency-check-data
        key: ${{ runner.os }}-nvd-${{ hashFiles('**/build.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-nvd-

    - name: Run OWASP dependency check
      run: ./gradlew dependencyCheckAnalyze --info
      env:
        # Use GitHub token for NVD API rate limiting if needed
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload dependency check reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-reports
        path: |
          app/build/reports/dependency-check/
        retention-days: 30

    - name: Comment on PR with security findings
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🚨 **Security Alert**: Dependency vulnerability check failed. Please review the dependency-check report in the build artifacts.'
          })

  dependency-submission:
    name: Submit Dependency Graph
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Submit dependency graph to GitHub for security analysis
    - name: Generate and submit dependency graph
      uses: gradle/gradle-build-action@v3
      with:
        arguments: dependencies --write-locks
        dependency-graph: generate-and-submit

  lock-file-check:
    name: Verify Dependency Lock Files
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Verify lock files are up to date
      run: |
        ./gradlew dependencies --write-locks
        if git diff --quiet; then
          echo "✅ Lock files are up to date"
        else
          echo "❌ Lock files are outdated. Please run './gradlew dependencies --write-locks' and commit the changes."
          git diff
          exit 1
        fi